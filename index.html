<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="fonts.css">
    <!-- <link -->
    <!--   href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&amp;display=swap" -->
    <!--   rel="stylesheet" -->
    <!-- /> -->
    <title>Startpage</title>
  </head>

  <body>
    <div class="wrapper">
      <div class="bg"></div>
      <div class="maincard">
        <div class="content">
          <div class="image">
            <img src="images/gif.gif" alt="No image" />
          </div>
          <div id="links" class="links">
            <section>
              <h3>social</h3>
              <ul>
                <li><a href="https://discord.com/app">discord</a></li>
                <li><a href="https://reddit.com">reddit</a></li>
                <li><a href="https://gall.dcinside.com/mgallery/board/lists/?id=linux">gallery</a></li>
                <!-- <li><a href="https://windowsforum.kr">winforum</a></li> -->
              </ul>
            </section>
            <section>
              <h3>search</h3>
              <ul>
                <li><a href="https://naver.com/">naver</a></li>
                <li><a href="https://github.com">github</a></li>
                <li><a href="https://coupang.com">coupang</a></li>
              </ul>
            </section>
            <section>
              <h3>ent</h3>
              <ul>
                <li><a href="https://youtube.com">youtube</a></li>
                <li><a href="https://netflix.com">netflix</a></li>
                <li><a href="https://www.disneyplus.com/ko-kr/home">disney+</a></li>
                <li><a href="https://www.coupangplay.com/home">couplay</a></li>
                <li><a href="https://kktv247.com/">sports</a></li>
              </ul>
            </section>
            <section>
              <h3>keebs</h3>
              <ul>
                <li><a href="https://smartstore.naver.com/swagkey">swagkey</a></li>
                <li><a href="https://smartstore.naver.com/geonlab">geonworks</a></li>
                <li><a href="https://monkeytype.com">monkeytype</a></li>
              </ul>
            </section>
          </div>
        </div>
        <div class="search">
          <form onsubmit="return search()">
            <label for="search_box" autofocus>> search : </label>
            <input
              type="text"
              placeholder="type here"
              name="search_box"
              id="search_box"
              autocomplete="off"
              autofocus
            />
          </form>
          <div id="autocomplete" class="autocomplete"></div>
        </div>
      </div>
    </div>
  </body>
  <script>
    const search_url = "https://google.com/search?q=";
    let selectedIndex = -1;
    let currentMatches = [];

    const sites = [...document.querySelectorAll("#links a")].map(a => ({
      name: a.textContent,
      url: a.href,
    }));

    function getBox() {
      return document.getElementById("search_box");
    }

    function getDD() {
      return document.getElementById("autocomplete");
    }

    function matchSites(query) {
      const q = query.toLowerCase().trim();
      if (!q) return [];
      return sites.filter(s => s.name.toLowerCase().includes(q));
    }

    function renderDropdown(matches) {
      const dd = getDD();
      currentMatches = matches;
      if (!matches.length) { dd.style.display = "none"; return; }

      dd.innerHTML = matches.map(
        (s, i) => `<div class="autocomplete-item${i === selectedIndex ? " selected" : ""}" data-index="${i}">${s.name}</div>`
      ).join("");
      dd.style.display = "block";
    }

    function handleInput() {
      selectedIndex = -1;
      renderDropdown(matchSites(getBox().value));
    }

    function handleKeydown(e) {
      const dd = getDD();
      const visible = dd.style.display === "block";
      const len = currentMatches.length;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (!visible || !len) return;
        selectedIndex = (selectedIndex + 1) % len;
        renderDropdown(currentMatches);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (!visible || !len) return;
        selectedIndex = (selectedIndex - 1 + len) % len;
        renderDropdown(currentMatches);
      } else if (e.key === "Enter") {
        if (visible && currentMatches.length === 1) {
          e.preventDefault();
          window.location.href = currentMatches[0].url;
          return;
        }
        if (visible && selectedIndex >= 0 && selectedIndex < len) {
          e.preventDefault();
          window.location.href = currentMatches[selectedIndex].url;
          return;
        }
      } else if (e.key === "Escape") {
        dd.style.display = "none";
        selectedIndex = -1;
      }
    }

    function search() {
      if (currentMatches.length === 1) {
        window.location.href = currentMatches[0].url;
        return false;
      }
      if (selectedIndex >= 0 && selectedIndex < currentMatches.length) {
        window.location.href = currentMatches[selectedIndex].url;
        return false;
      }

      const is_url = /^(((http)|(https)):\/\/)?(www\.)?[a-zA-Z0-9]+\.[a-zA-Z]+\/?([a-zA-Z0-9/?=&%-_]+)?$/;
      const is_ip = /^(((http)|(https)):\/\/)?([0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}.[0-9]{1,3}|localhost)(:[0-9]{1,5})?(\/[a-zA-Z0-9/?=&%-_]+)?$/;

      const search_term = getBox().value;
      const url_match = search_term.match(is_url);
      const ip_match = search_term.match(is_ip);
      if (url_match) {
        window.location.href = url_match[0].substring(0, 4) == "http" ? url_match[0] : "https://" + url_match[0];
      } else if (ip_match) {
        window.location.href = ip_match[0].substring(0, 4) == "http" ? ip_match[0] : "http://" + ip_match[0];
      } else {
        window.location.href = search_url + encodeURIComponent(search_term);
      }
      return false;
    }

    document.addEventListener("DOMContentLoaded", () => {
      getBox().addEventListener("input", handleInput);
      getBox().addEventListener("keydown", handleKeydown);
    });
  </script>
</html>
